<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Responsive viewport for all devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Café Noir</title>

    <!-- Core stylesheet -->
    <link rel="stylesheet" href="../css/style.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Dancing+Script&family=Kaushan+Script&family=Lora&family=Merriweather&family=Montserrat&family=Poppins:wght@400;500;600;700&family=Playfair+Display&family=Raleway&family=Pacifico&display=swap" rel="stylesheet">

    <!-- Animation library -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>

<body oncontextmenu="return false;">
    
    <!-- ===================== HEADER SECTION ===================== -->
    <header>
        <!-- Brand / Logo -->
        <div class="name animate__animated animate__heartBeat">Café Noir</div>

        <!-- Primary Navigation -->
        <nav class="animate__animated animate__bounce">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="about.html">About us</a></li>
                <li><a href="contact.html">Contact us</a></li>
            </ul>
        </nav>
    </header>
    <!-- ========================= END HEADER ========================= -->


    <!-- ===================== HERO / INTRO SECTION ===================== -->
    <main>
        <!-- Tagline -->
        <div class="greeting animate__animated animate__fadeInLeft">Welcome to</div>

        <!-- Brand Heading -->
        <div class="cafe-name animate__animated animate__fadeInRight">Café Noir</div>

        <!-- Description Tagline -->
        <p class="description animate__animated animate__zoomIn">
            Step into a world where every bite is a journey, every aroma tells a story, 
            and every moment is crafted to brighten your day.
        </p>

        <!-- Primary Action Buttons (Call-to-Actions) -->
        <div class="buttons animate__animated animate__fadeInDown">

            <!-- CTA #1: Booking button (future functionality to be added) -->
            <button class="booking">Book Now</button>

            <!-- CTA #2: Navigate to Menu Page -->
            <button class="menu" onclick="location.href='menu.html'">View Menus</button>
        </div>
    </main>
    <!-- ====================== END HERO SECTION ====================== -->


    <!-- ========================= FOOTER SECTION ========================= -->
    <footer>

        <!-- Contact Info -->
        <div class="contact">

            <!-- Phone Contact -->
            <div class="phone">
                <img src="../icons/phone-icon.png" alt="Phone" class="phone-icon animate__animated animate__backInLeft">
                <a href="tel:+917980670247" class="number animate__animated animate__backInLeft">
                    +917980670247
                </a>
            </div>

            <!-- Email Contact -->
            <div class="email">
                <img src="../icons/mail-icon.png" alt="Email" class="email-icon animate__animated animate__backInLeft">
                <a href="mailto:bagswarnava3@outlook.com" class="number animate__animated animate__backInLeft">
                    bagswarnava3@outlook.com
                </a>
            </div>

        </div>

        <!-- Footer Tagline -->
        <div class="tagline animate__animated animate__fadeInUp">
            Where Every Bite Feels Like Home
        </div>

        <!-- Social Media Links -->
        <div class="social-media animate__animated animate__backInRight">
            <a href="https://www.facebook.com/swarnavabag3" target="_blank">
                <img src="../icons/facebook-icon.png" class="facebook-icon" alt="Facebook">
            </a>

            <a href="https://www.instagram.com/bag_swarnava" target="_blank">
                <img src="../icons/instagram-icon.png" class="instagram-icon" alt="Instagram">
            </a>

            <a href="https://www.youtube.com" target="_blank">
                <img src="../icons/youtube-icon.png" class="youtube-icon" alt="YouTube">
            </a>
        </div>

    </footer>
    <!-- ========================= END FOOTER ========================= -->

</body>
</html>
