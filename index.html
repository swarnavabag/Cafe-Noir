<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Responsive viewport for all devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Café Noir</title>

    <!-- Core stylesheet -->
    <link rel="stylesheet" href="/assets/css/style.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Poppins:wght@400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">

    <!-- Animation library -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <link rel="preload" as="image" href="/assets/photos/home_bg.jpg">
</head>

<body oncontextmenu="return false;">
    
    <!-- ===================== HEADER SECTION ===================== -->
    <header>
        <!-- Brand / Logo -->
        <div class="name">Café Noir</div>
        <!-- Primary Navigation -->
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="about.html">About Us</a></li>
            </ul>
        </nav>
    </header>
    <!-- ========================= END HEADER ========================= -->


    <!-- ===================== HERO / INTRO SECTION ===================== -->
    <section class="main">
        <!-- Tagline -->
        <div class="greeting animate__animated animate__fadeInLeft">Welcome to Cafe Noir</div>

        <!-- Description Tagline -->
        <p class="description animate__animated animate__zoomIn">
            a world where every bite is a journey, every aroma tells a story,<br>and every moment is crafted to brighten your day.
        </p>

        <!-- Primary Action Buttons (Call-to-Actions) -->
        <div class="btns animate__animated animate__fadeInDown">
            
            <!-- CTA #1: Navigate to Menu Page -->
            <button class="primary" onclick="location.href='menu.html'">View Menu</button>
            
            <!-- CTA #2: Booking button (future functionality to be added) -->
            <button class="secondary" onclick="location.href='about.html'">About Us</button>
        </div>
    </section>
    <!-- ====================== END HERO SECTION ====================== -->

    <!-- Footer -->
    <footer>
        <p>Where Every Bite Feels Like Home</p>
    </footer>

</body>
</html>
